<title>Range Master</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23dc2626'/><polygon points='50,15 85,50 50,85 15,50' fill='white' opacity='.9'/><polygon points='50,28 72,50 50,72 28,50' fill='%23dc2626'/></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root,[data-theme="light"]{
--bg:#f5f5f7;--bg2:#eaeaef;--bg3:#e0e0e8;--bg4:#d4d4dc;
--surface:rgba(255,255,255,.85);--surfaceSolid:#ffffff;
--border:rgba(0,0,0,.06);--border2:rgba(0,0,0,.1);
--text:#1a1a2e;--text2:#4a4a64;--text3:#7a7a94;--text4:#a0a0b4;
--red:#dc2626;--red2:#ef4444;--redBg:rgba(220,38,38,.08);
--green:#16a34a;--green2:#22c55e;--greenBg:rgba(22,163,74,.08);
--gold:#d97706;--goldBg:rgba(217,119,6,.08);
--blue:#2563eb;--blueBg:rgba(37,99,235,.07);
--accent:#dc2626;--accentBg:rgba(220,38,38,.05);
--shadow:0 2px 16px rgba(0,0,0,.06);--shadow2:0 8px 32px rgba(0,0,0,.08);
--navBg:rgba(26,26,50,.95);
--gcRaise:rgba(220,38,38,.2);--gcRaiseC:#b91c1c;
--gcCall:rgba(22,163,74,.18);--gcCallC:#15803d;
--gcFold:#eaeaef;--gcFoldC:#a0a0b4;
--gcMixRC:linear-gradient(135deg,rgba(220,38,38,.2) 50%,rgba(22,163,74,.18) 50%);--gcMixRCC:#92400e;
--gcMixRF:linear-gradient(135deg,rgba(220,38,38,.15) 50%,#eaeaef 50%);--gcMixRFC:#b91c1c;
--gcMixCF:linear-gradient(135deg,rgba(22,163,74,.15) 50%,#eaeaef 50%);--gcMixCFC:#15803d;
}
[data-theme="dark"]{
--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22222e;
--surface:rgba(26,26,42,.85);--surfaceSolid:#1a1a2a;
--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
--text:#e8e8f0;--text2:#a0a0b8;--text3:#6a6a82;--text4:#44445a;
--red:#dc2626;--red2:#ef4444;--redBg:rgba(220,38,38,.12);
--green:#22c55e;--green2:#4ade80;--greenBg:rgba(34,197,94,.12);
--gold:#f59e0b;--goldBg:rgba(245,158,11,.12);
--blue:#3b82f6;--blueBg:rgba(59,130,246,.1);
--accent:#dc2626;--accentBg:rgba(220,38,38,.08);
--shadow:0 2px 16px rgba(0,0,0,.4);--shadow2:0 8px 32px rgba(0,0,0,.5);
--navBg:rgba(10,10,18,.95);
--gcRaise:rgba(220,38,38,.35);--gcRaiseC:#fca5a5;
--gcCall:rgba(34,197,94,.3);--gcCallC:#86efac;
--gcFold:var(--bg2);--gcFoldC:var(--text4);
--gcMixRC:linear-gradient(135deg,rgba(220,38,38,.35) 50%,rgba(34,197,94,.3) 50%);--gcMixRCC:#fde68a;
--gcMixRF:linear-gradient(135deg,rgba(220,38,38,.25) 50%,var(--bg2) 50%);--gcMixRFC:#fca5a5;
--gcMixCF:linear-gradient(135deg,rgba(34,197,94,.2) 50%,var(--bg2) 50%);--gcMixCFC:#86efac;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
.thbtn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:8px;transition:all .15s;}.thbtn:hover{background:var(--bg3);transform:scale(1.1);}

/* Nav */
.nav{background:var(--navBg,rgba(10,10,18,.95));backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:50;}
.nav-brand{display:flex;align-items:center;gap:10px;margin-right:32px;}
.nav-brand svg{width:22px;height:22px;}
.nav-brand span{font-weight:800;font-size:14px;letter-spacing:-.5px;color:var(--text);}
.nav-tabs{display:flex;gap:2px;height:100%;align-items:end;}
.ntab{padding:10px 18px;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border:none;background:none;font-family:inherit;transition:all .15s;border-bottom:2px solid transparent;letter-spacing:.3px;text-transform:uppercase;}
.ntab:hover{color:var(--text2);}
.ntab.active{color:var(--red);border-bottom-color:var(--red);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.nav-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);padding:4px 10px;border:1px solid var(--border2);border-radius:6px;}

/* Main */
.main{max-width:1100px;margin:0 auto;padding:24px;}
.tc{display:none;animation:fu .25s ease;}.tc.active{display:block;}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Stats bar */
.stats{display:flex;gap:1px;background:var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px;}
.stat{flex:1;padding:16px 18px;background:var(--bg2);text-align:center;}
.stat:first-child{border-radius:12px 0 0 12px;}.stat:last-child{border-radius:0 12px 12px 0;}
.stat-v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;color:var(--text);}
.stat-v.red{color:var(--red);}.stat-v.green{color:var(--green);}.stat-v.gold{color:var(--gold);}
.stat-l{font-size:9px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:1px;font-weight:600;}

/* Cards */
.card{background:var(--surface);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;transition:border-color .15s;}
.card:hover{border-color:var(--border2);}
.card-h{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.card-title{font-size:15px;font-weight:700;letter-spacing:-.3px;}
.card-body{padding:20px;}

/* Range Grid */
.grid-wrap{display:flex;justify-content:center;margin:0 auto;}
.grid{display:grid;grid-template-columns:repeat(14,1fr);gap:1px;background:var(--bg);border-radius:8px;overflow:hidden;width:100%;max-width:680px;}
.gc{display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;height:38px;min-width:0;transition:all .12s;position:relative;user-select:none;}
.gc.hdr{background:var(--bg3);color:var(--text3);font-weight:700;font-size:9px;}
.gc.raise{background:var(--gcRaise);color:var(--gcRaiseC);}
.gc.call{background:var(--gcCall);color:var(--gcCallC);}
.gc.fold{background:var(--gcFold);color:var(--gcFoldC);}
.gc.mixed-rc{background:var(--gcMixRC);color:var(--gcMixRCC);}
.gc.mixed-rf{background:var(--gcMixRF);color:var(--gcMixRFC);}
.gc.mixed-cf{background:var(--gcMixCF);color:var(--gcMixCFC);}
.gc.pair{font-weight:800;}
.gc:hover{filter:brightness(1.3);z-index:1;transform:scale(1.05);}
.gc .pct{position:absolute;bottom:1px;right:2px;font-size:6px;opacity:.5;font-weight:400;}

/* Legend */
.legend{display:flex;gap:16px;justify-content:center;margin:12px 0;font-size:11px;color:var(--text3);}
.legend span{display:flex;align-items:center;gap:5px;}
.ldot{width:12px;height:12px;border-radius:3px;}
.ldot.r{background:rgba(220,38,38,.4);}.ldot.c{background:rgba(34,197,94,.35);}.ldot.f{background:var(--bg2);border:1px solid var(--border2);}.ldot.m{background:linear-gradient(135deg,rgba(220,38,38,.3) 50%,rgba(34,197,94,.25) 50%);}

/* Progress */
.prog{display:flex;gap:3px;align-items:center;}
.prog .dot{width:8px;height:8px;border-radius:50%;background:var(--bg4);transition:background .2s;}
.prog .dot.done{background:var(--red);}.prog .dot.gold{background:var(--gold);}
.prog-l{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--text3);margin-left:6px;}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;}
.badge.new{background:var(--blueBg);color:var(--blue);}.badge.learning{background:var(--redBg);color:var(--red2);}
.badge.mastered{background:var(--goldBg);color:var(--gold);}.badge.due{background:rgba(220,38,38,.2);color:var(--red2);}
.badge.noex{background:rgba(245,158,11,.15);color:var(--gold);}

/* Two column layout */
.al{display:flex;gap:20px;min-height:70vh;}
.al-l{width:320px;flex-shrink:0;overflow-y:auto;max-height:calc(100vh - 100px);position:sticky;top:76px;}
.al-l::-webkit-scrollbar{width:3px;}.al-l::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px;}
.al-r{flex:1;min-width:0;}
@media(max-width:900px){.al{flex-direction:column;}.al-l{width:100%;position:static;max-height:none;}}

/* List items */
.li{padding:12px 14px;border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer;transition:all .12s;background:var(--bg2);}
.li:hover{border-color:var(--border2);background:var(--bg3);}
.li.sel{border-color:var(--red);background:rgba(220,38,38,.06);box-shadow:0 0 0 1px rgba(220,38,38,.2);}
.li.mst{border-color:rgba(245,158,11,.3);}
.li-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.li-name{font-size:13px;font-weight:600;}.li-cat{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.li-bot{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.li-status{font-size:10px;color:var(--text4);font-family:'JetBrains Mono',monospace;}

/* Detail panel */
.dp{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.dp-name{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;}
.dp-cat{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:16px;}
.dp-section{margin-top:16px;}.dp-section-t{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}

/* Timeline */
.tl{display:flex;flex-direction:column;gap:0;}
.tl-i{display:flex;align-items:center;gap:10px;padding:5px 0;position:relative;}
.tl-i:not(:last-child)::after{content:'';position:absolute;left:8px;top:24px;bottom:-5px;width:1.5px;background:var(--border2);}
.tl-d{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;z-index:1;}
.tl-d.done{background:var(--red);color:white;}.tl-d.pend{background:var(--bg4);color:var(--text4);}
.tl-d.due{background:var(--red2);color:white;animation:pulse 2s infinite;}.tl-d.gld{background:var(--gold);color:white;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.tl-info{flex:1;font-size:11px;color:var(--text2);}.tl-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text4);}

/* Notes */
.notes{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.note-item{padding:6px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:start;}
.note-item:last-child{border:none;}
.note-date{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text4);min-width:36px;padding-top:2px;flex-shrink:0;}
.note-text{font-size:12px;color:var(--text2);line-height:1.5;}
.note-input{width:100%;padding:10px 14px;border:1px solid var(--border2);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;background:var(--bg);color:var(--text);outline:none;resize:none;min-height:48px;transition:border-color .2s;}
.note-input:focus{border-color:var(--red);}

/* Buttons */
.btn{padding:9px 18px;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:6px;letter-spacing:.2px;}
.btn-p{background:var(--red);color:white;}.btn-p:hover{background:#b91c1c;}
.btn-s{background:transparent;color:var(--text2);border:1px solid var(--border2);}.btn-s:hover{background:var(--bg3);color:var(--text);}
.btn-g{background:var(--green);color:white;}.btn-g:hover{background:#16a34a;}
.btn-d{background:transparent;color:var(--text4);border:1px solid var(--border);}.btn-d:hover{background:var(--redBg);color:var(--red);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.actions{display:flex;gap:8px;margin-top:12px;align-items:center;}
.actions .note-hint{font-size:10px;color:var(--text4);flex:1;}

/* Empty */
.empty{text-align:center;padding:48px 24px;color:var(--text4);}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.4;}.empty-text{font-size:14px;font-weight:500;margin-bottom:16px;}

/* Today cards */
.today-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;}
.today-card.due-card{border-color:rgba(220,38,38,.2);}
.today-card.noex-card{border-color:rgba(245,158,11,.2);}
.tc-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.tc-name{font-size:16px;font-weight:700;letter-spacing:-.3px;}
.tc-body{padding:20px;}

/* Filter */
.fb{display:flex;gap:8px;margin-bottom:16px;align-items:center;}
.fb select{padding:6px 10px;border:1px solid var(--border2);border-radius:6px;font-family:'Inter',sans-serif;font-size:11px;background:var(--bg2);color:var(--text);outline:none;font-weight:500;}

/* Progress bar */
.pbar{width:100%;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin:8px 0;}
.pbar-f{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:2px;transition:width .5s;}
</style>
</head>

function daysLeft(r){if(!r.nextReviewDate||r.mastered)return null;return Math.round((new Date(r.nextReviewDate)-new Date(td()))/864e5);}
function isDue(r){return!r.mastered&&r.activated&&r.nextReviewDate&&r.nextReviewDate<=td();}
function isNoNote(r){return r.activated&&r.reviewCount===0&&r.notes.length===0;}
function save(){try{localStorage.setItem('prm1',JSON.stringify(D));}catch(e){}}
function load(){try{const s=localStorage.getItem('prm1');if(s){D=JSON.parse(s);if(!D.ranges)D.ranges=[];if(!D.dailyLog)D.dailyLog={};}}catch(e){}}

function getMeta(id){return RANGE_META.find(m=>m.id===id);}
function getGrid(id){return GTO_RANGES[id]||{};}
function getHand(row,col){const r1=RANKS[row],r2=RANKS[col];if(row===col)return r1+r2;return row<col?r1+r2+'s':r2+r1+'o';}
function getAction(grid,hand){const v=grid[hand];if(!v)return[100,0,0];return v;}
function actionClass(f,c,r){
  if(r>=70)return'raise';if(c>=70)return'call';if(f>=70)return'fold';
  if(r>=30&&c>=30)return'mixed-rc';if(r>=30&&f>=30)return'mixed-rf';if(c>=30&&f>=30)return'mixed-cf';
  if(r>=c&&r>=f&&r>0)return'raise';if(c>=f&&c>0)return'call';return'fold';
}

function rGrid(rangeId){
  const grid=getGrid(rangeId);
  let h='<div class="grid-wrap"><div class="grid">';
  // Header row
  h+='<div class="gc hdr"></div>';
  RANKS.forEach(r=>{h+=`<div class="gc hdr">${r}</div>`;});
  // Data rows
  for(let row=0;row<13;row++){
    h+=`<div class="gc hdr">${RANKS[row]}</div>`;
    for(let col=0;col<13;col++){
      const hand=getHand(row,col);
      const[f,c,r]=getAction(grid,hand);
      const cls=actionClass(f,c,r);
      const isPair=row===col;
      const dominant=r>=c&&r>=f?r:(c>=f?c:f);
      h+=`<div class="gc ${cls}${isPair?' pair':''}" title="${hand}: R${r}% C${c}% F${f}%">${hand}${dominant<100&&dominant>0?`<span class="pct">${dominant}</span>`:''}</div>`;
    }
  }
  h+='</div></div>';
  h+='<div class="legend"><span><div class="ldot r"></div>Raise</span><span><div class="ldot c"></div>Call</span><span><div class="ldot f"></div>Fold</span><span><div class="ldot m"></div>Mixed</span></div>';
  return h;
}

function rProg(r){
  let h='<div class="prog">';
  for(let i=0;i<5;i++){const c=i<r.reviewCount?(r.mastered?'dot gold':'dot done'):'dot';h+=`<div class="${c}"></div>`;}
  h+=`<span class="prog-l">${r.reviewCount}/5</span></div>`;return h;
}

// NAV
function rNav(){
  const n=document.getElementById('nv');n.innerHTML='';
  TABS.forEach(t=>{const b=document.createElement('button');b.className='ntab'+(ct===t.id?' active':'');b.textContent=t.label;b.onclick=()=>{ct=t.id;rNav();rT();};n.appendChild(b);});
  const learned=D.ranges.length,mastered=D.ranges.filter(r=>r.mastered).length;
  document.getElementById('navCount').textContent=`${mastered}/${RANGE_META.length} mastered`;
}
function rT(){document.querySelectorAll('.tc').forEach(e=>e.classList.remove('active'));document.getElementById('t'+ct.charAt(0).toUpperCase()+ct.slice(1)).classList.add('active');
  if(ct==='today')rToday();else if(ct==='all')rAll();else if(ct==='progress')rProgress();else rGuide();
}

// TODAY

  const el=document.getElementById('tToday');
  const dues=D.ranges.filter(isDue).sort((a,b)=>(a.nextReviewDate||'').localeCompare(b.nextReviewDate||''));
  const noNotes=D.ranges.filter(r=>r.activated&&!r.mastered&&r.notes.length===0&&r.reviewCount===0);
  const notStarted=RANGE_META.filter(m=>!D.ranges.find(r=>r.id===m.id)).length;
  const mastered=D.ranges.filter(r=>r.mastered).length;
  const learning=D.ranges.filter(r=>r.activated&&!r.mastered).length;

  let h=`<div class="stats"><div class="stat"><div class="stat-v red">${dues.length}</div><div class="stat-l">Due Today</div></div><div class="stat"><div class="stat-v">${learning}</div><div class="stat-l">Learning</div></div><div class="stat"><div class="stat-v gold">${mastered}</div><div class="stat-l">Mastered</div></div><div class="stat"><div class="stat-v">${notStarted}</div><div class="stat-l">Remaining</div></div></div>`;

  if(notStarted>0){
    h+=`<div style="margin-bottom:20px"><button class="btn btn-p" onclick="learnNew()">Learn New Range</button></div>`;
  }

  if(noNotes.length){
    h+=`<div class="dp-section-t" style="margin-bottom:10px;color:var(--gold)">Needs First Note</div>`;
    noNotes.forEach(r=>{
      const m=getMeta(r.id);if(!m)return;
      h+=`<div class="today-card noex-card"><div class="tc-header"><div><div class="tc-name">${esc(m.label)}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${esc(m.desc)}</div></div><span class="badge noex">No Note</span></div><div class="tc-body">${rGrid(r.id)}<div style="margin-top:16px"><textarea class="note-input" id="tn_${r.id}" placeholder="Write notes about this range..."></textarea><div class="actions"><span class="note-hint">Save a note to start your review cycle</span><button class="btn btn-p" onclick="saveNote('${r.id}','tn_${r.id}',true)">Save & Activate</button></div></div></div></div>`;
    });
  }

  if(dues.length){
    h+=`<div class="dp-section-t" style="margin-bottom:10px;color:var(--red2)">Due for Review</div>`;
    dues.forEach(r=>{
      const m=getMeta(r.id);if(!m)return;
      h+=`<div class="today-card due-card"><div class="tc-header"><div><div class="tc-name">${esc(m.label)}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${esc(m.desc)}</div></div><div style="display:flex;align-items:center;gap:8px"><span class="badge due">Review #${r.reviewCount+1}</span>${rProg(r)}</div></div><div class="tc-body">${rGrid(r.id)}`;
      if(r.notes.length){h+=`<div class="dp-section" style="margin-top:16px"><div class="dp-section-t">Previous Notes</div><div class="notes">`;r.notes.forEach(n=>{h+=`<div class="note-item"><span class="note-date">${fmt(n.date)}</span><span class="note-text">${esc(n.text)}</span></div>`;});h+=`</div></div>`;}
      h+=`<div style="margin-top:12px"><textarea class="note-input" id="tn_${r.id}" placeholder="Write review notes..."></textarea><div class="actions"><span class="note-hint">Review #${r.reviewCount+1} of 5</span><button class="btn btn-p" onclick="saveNote('${r.id}','tn_${r.id}',false)">Save & Complete Review</button></div></div></div></div>`;
    });
  }

  if(!dues.length&&!noNotes.length&&D.ranges.length){
    h+=`<div class="empty"><div class="empty-icon">◆</div><div class="empty-text">All clear for today</div>${notStarted>0?'<button class="btn btn-p" onclick="learnNew()">Learn New Range</button>':''}</div>`;
  }
  if(!D.ranges.length){
    h+=`<div class="empty"><div class="empty-icon">◆</div><div class="empty-text">No ranges started yet</div><button class="btn btn-p" onclick="learnNew()">Learn New Range</button></div>`;
  }

}

function learnNew(){
  const notStarted=RANGE_META.filter(m=>!D.ranges.find(r=>r.id===m.id));
  if(!notStarted.length)return;
  const pick=notStarted[Math.floor(Math.random()*notStarted.length)];
  D.ranges.push({id:pick.id,activated:true,learnedDate:td(),reviewCount:0,nextReviewDate:null,mastered:false,notes:[]});
  save();rNav();rT();
}

function saveNote(id,inputId,isActivation){
  const r=D.ranges.find(x=>x.id===id);if(!r)return;
  const inp=document.getElementById(inputId);
  if(!inp||!inp.value.trim()){alert('Please write a note.');return;}
  r.notes.push({date:td(),text:inp.value.trim()});
  if(isActivation){
    r.nextReviewDate=cNext(td(),0);
  } else if(isDue(r)){
    r.reviewCount++;
    if(r.reviewCount>=5){r.mastered=true;r.nextReviewDate=null;}
    else{r.nextReviewDate=cNext(td(),r.reviewCount);}
  }
  save();rNav();rT();
  if(ct==='all'){rAllList();rAllDet();}
}

// ALL
function rAll(){
  const el=document.getElementById('tAll');
  let h=`<div class="fb"><select id="ff" onchange="rAllList()"><option value="all">All</option><option value="rfi">RFI Only</option><option value="vs">vs RFI Only</option><option value="learning">Learning</option><option value="due">Due</option><option value="mastered">Mastered</option><option value="not_started">Not Started</option></select></div>`;
  h+=`<div class="al"><div class="al-l" id="aL"></div><div class="al-r" id="aR"></div></div>`;
  el.innerHTML=h;rAllList();rAllDet();
}

function rAllList(){
  const el=document.getElementById('aL');if(!el)return;
  const f=document.getElementById('ff')?.value||'all';
  let items=RANGE_META.map(m=>{
    const r=D.ranges.find(x=>x.id===m.id);
    return{meta:m,data:r};
  }).filter(({meta:m,data:r})=>{
    if(f==='rfi')return m.cat==='RFI';
    if(f==='vs')return m.cat==='VS_RFI';
    if(f==='learning')return r&&r.activated&&!r.mastered;
    if(f==='due')return r&&isDue(r);
    if(f==='mastered')return r&&r.mastered;
    if(f==='not_started')return!r;
    return true;
  }).sort((a,b)=>{
    if(!a.data&&b.data)return 1;if(a.data&&!b.data)return-1;
    if(a.data&&b.data){
      if(a.data.mastered!==b.data.mastered)return a.data.mastered?1:-1;
      const ad=isDue(a.data),bd=isDue(b.data);if(ad!==bd)return ad?-1:1;
    }
    return 0;
  });

  let h='';
  let lastCat='';
  items.forEach(({meta:m,data:r})=>{
    if(f==='all'&&m.cat!==lastCat){
      lastCat=m.cat;
      h+=`<div style="font-size:9px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:1px;padding:8px 4px 4px;margin-top:${lastCat?'12px':'0'}">${m.cat==='RFI'?'Raise First In':'vs RFI (3bet / Call / Fold)'}</div>`;
    }
    const started=!!r;const due=r&&isDue(r);const dl=r?daysLeft(r):null;
    let status='';
    if(!started)status='Not started';
    else if(r.mastered)status='Mastered';
    else if(due)status='Due today';
    else if(dl!==null&&dl>0)status=`${dl}d`;
    else if(r.notes.length===0)status='Needs note';
    else status=fmt(r.nextReviewDate);

    h+=`<div class="li${selId===m.id?' sel':''}${r&&r.mastered?' mst':''}" onclick="selId='${m.id}';rAllList();rAllDet();">`;
    h+=`<div class="li-top"><span class="li-name">${esc(m.label)}</span>${r?rProg(r):'<span class="badge new">—</span>'}</div>`;
    h+=`<div class="li-bot"><span class="li-cat">${esc(m.cat)}</span><span class="li-status">${status}</span></div></div>`;
  });
  if(!items.length)h=`<div class="empty" style="padding:20px"><div class="empty-text" style="font-size:12px">No ranges match filter</div></div>`;
  el.innerHTML=h;
}

function rAllDet(){
  const el=document.getElementById('aR');if(!el)return;
  const m=RANGE_META.find(x=>x.id===selId);
  if(!m){el.innerHTML=`<div class="dp"><div class="empty" style="padding:24px"><div class="empty-icon">◆</div><div class="empty-text">Select a range</div></div></div>`;return;}
  const r=D.ranges.find(x=>x.id===m.id);
  const due=r&&isDue(r);const noNote=r&&r.notes.length===0&&r.reviewCount===0;

  let h=`<div class="dp"><div class="dp-name">${esc(m.label)}</div><div class="dp-cat">${esc(m.desc)}</div>`;
  if(r)h+=rProg(r);
  h+=`<div style="margin-top:16px">${rGrid(m.id)}</div>`;

  // Timeline
  if(r){
    h+=`<div class="dp-section"><div class="dp-section-t">Timeline</div><div class="tl">`;
    h+=`<div class="tl-i"><div class="tl-d done">+</div><div class="tl-info">Started</div><div class="tl-date">${fmt(r.learnedDate)}</div></div>`;
    for(let i=0;i<5;i++){
      const done=i<r.reviewCount;const isCur=!done&&r.reviewCount===i&&r.nextReviewDate===td();
      const dc=done?(i===4?'tl-d gld':'tl-d done'):isCur?'tl-d due':'tl-d pend';
      const rv=r.notes[i+1];
      h+=`<div class="tl-i"><div class="${dc}">${done?'✓':(i+1)}</div><div class="tl-info">Review ${i+1} · +${INTV[i]}d</div><div class="tl-date">${done&&r.notes[i]?fmt(r.notes[i].date):(r.reviewCount===i&&r.nextReviewDate?fmt(r.nextReviewDate):'—')}</div></div>`;
    }
    h+=`</div></div>`;

    // Notes
    if(r.notes.length){
      h+=`<div class="dp-section"><div class="dp-section-t">Notes</div><div class="notes">`;
      r.notes.forEach(n=>{h+=`<div class="note-item"><span class="note-date">${fmt(n.date)}</span><span class="note-text">${esc(n.text)}</span></div>`;});
      h+=`</div></div>`;
    }

    // Note input
    if(!r.mastered){
      const label=noNote?'Save & Activate':due?'Save & Complete Review':'Save Note';
      h+=`<div style="margin-top:14px"><textarea class="note-input" id="aIn_${r.id}" placeholder="Write notes..."></textarea><div class="actions"><span class="note-hint">${noNote?'First note activates review cycle':due?'Review #'+(r.reviewCount+1)+' of 5':'Add note'}</span><button class="btn btn-p" onclick="saveNoteAll('${r.id}')"> ${label}</button></div></div>`;
    }

    h+=`<div style="margin-top:16px;display:flex;justify-content:space-between"><span class="badge ${r.mastered?'mastered':'learning'}">${r.mastered?'Mastered':'Learning'}</span><button class="btn btn-d" onclick="resetR('${r.id}')" style="font-size:10px">Reset</button></div>`;
  } else {
    h+=`<div style="margin-top:16px"><button class="btn btn-p" onclick="startR('${m.id}')">Start Learning</button></div>`;
  }
  h+=`</div>`;
  el.innerHTML=h;
}

function saveNoteAll(id){
  const r=D.ranges.find(x=>x.id===id);if(!r)return;
  const noNote=r.notes.length===0&&r.reviewCount===0;
  const due=isDue(r);
  saveNote(id,'aIn_'+id,noNote);
  rAllList();rAllDet();
}

function startR(id){
  if(D.ranges.find(r=>r.id===id))return;
  D.ranges.push({id,activated:true,learnedDate:td(),reviewCount:0,nextReviewDate:null,mastered:false,notes:[]});
  selId=id;save();rAllList();rAllDet();
}

function resetR(id){
  if(!confirm('Reset this range? All progress will be lost.'))return;
  D.ranges=D.ranges.filter(r=>r.id!==id);
  save();rNav();rAllList();rAllDet();
}

// PROGRESS
function rProgress(){
  const el=document.getElementById('tProgress');
  const total=RANGE_META.length;
  const started=D.ranges.length;
  const mastered=D.ranges.filter(r=>r.mastered).length;
  const learning=D.ranges.filter(r=>r.activated&&!r.mastered).length;
  const pct=total>0?Math.round(mastered/total*100):0;

  let h=`<div class="stats"><div class="stat"><div class="stat-v">${total}</div><div class="stat-l">Total Ranges</div></div><div class="stat"><div class="stat-v">${started}</div><div class="stat-l">Started</div></div><div class="stat"><div class="stat-v red">${learning}</div><div class="stat-l">Learning</div></div><div class="stat"><div class="stat-v gold">${mastered}</div><div class="stat-l">Mastered</div></div></div>`;

  h+=`<div class="card"><div class="card-h"><span class="card-title">Overall Progress</span><span style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:800;color:var(--gold)">${pct}%</span></div><div class="card-body"><div class="pbar"><div class="pbar-f" style="width:${pct}%"></div></div></div></div>`;

  // Category breakdown
  [{cat:'RFI',label:'Raise First In'},{cat:'VS_RFI',label:'vs RFI'}].forEach(({cat,label})=>{
    const catMeta=RANGE_META.filter(m=>m.cat===cat);
    const catMastered=catMeta.filter(m=>D.ranges.find(r=>r.id===m.id&&r.mastered)).length;
    const catPct=catMeta.length>0?Math.round(catMastered/catMeta.length*100):0;
    h+=`<div class="card"><div class="card-h"><span class="card-title">${label}</span><span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text3)">${catMastered}/${catMeta.length}</span></div><div class="card-body"><div class="pbar"><div class="pbar-f" style="width:${catPct}%"></div></div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px">`;
    catMeta.forEach(m=>{
      const r=D.ranges.find(x=>x.id===m.id);
      const cls=!r?'new':(r.mastered?'mastered':'learning');
      h+=`<span class="badge ${cls}">${m.label}</span>`;
    });
    h+=`</div></div></div>`;
  });

  // Upcoming reviews
  const upcoming=D.ranges.filter(r=>r.activated&&!r.mastered&&r.nextReviewDate).sort((a,b)=>(a.nextReviewDate||'').localeCompare(b.nextReviewDate||''));
  if(upcoming.length){
    h+=`<div class="card"><div class="card-h"><span class="card-title">Upcoming Reviews</span></div><div class="card-body">`;
    upcoming.slice(0,10).forEach(r=>{
      const m=getMeta(r.id);if(!m)return;
      const dl=daysLeft(r);const due=dl!==null&&dl<=0;
      h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:13px;font-weight:600">${esc(m.label)}</span>${rProg(r)}</div><span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${due?'var(--red)':'var(--text3)'}">${due?'Due':dl+'d'}</span></div>`;
    });
    h+=`</div></div>`;
  }

  el.innerHTML=h;
}

function tTh(){
  const h=document.documentElement;
  const cur=h.getAttribute('data-theme');
  const n=cur==='dark'?'light':'dark';
  h.setAttribute('data-theme',n);
  document.getElementById('thBtn').textContent=n==='dark'?'☀️':'🌙';
  try{localStorage.setItem('prm_theme',n);}catch(e){}
}
function lTh(){
  try{
    const t=localStorage.getItem('prm_theme');
    if(t){document.documentElement.setAttribute('data-theme',t);document.getElementById('thBtn').textContent=t==='dark'?'☀️':'🌙';}
    else{document.documentElement.setAttribute('data-theme','dark');document.getElementById('thBtn').textContent='☀️';}
  }catch(e){document.documentElement.setAttribute('data-theme','dark');}
}
