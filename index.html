<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Range Master</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23dc2626'/><polygon points='50,15 85,50 50,85 15,50' fill='white' opacity='.9'/><polygon points='50,28 72,50 50,72 28,50' fill='%23dc2626'/></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root,[data-theme="light"]{
--bg:#f5f5f7;--bg2:#eaeaef;--bg3:#e0e0e8;--bg4:#d4d4dc;
--surface:rgba(255,255,255,.85);--surfaceSolid:#ffffff;
--border:rgba(0,0,0,.06);--border2:rgba(0,0,0,.1);
--text:#1a1a2e;--text2:#4a4a64;--text3:#7a7a94;--text4:#a0a0b4;
--red:#dc2626;--red2:#ef4444;--redBg:rgba(220,38,38,.08);
--green:#16a34a;--green2:#22c55e;--greenBg:rgba(22,163,74,.08);
--gold:#d97706;--goldBg:rgba(217,119,6,.08);
--blue:#2563eb;--blueBg:rgba(37,99,235,.07);
--accent:#dc2626;--accentBg:rgba(220,38,38,.05);
--shadow:0 2px 16px rgba(0,0,0,.06);--shadow2:0 8px 32px rgba(0,0,0,.08);
--navBg:rgba(26,26,50,.95);
--gcRaise:rgba(220,38,38,.2);--gcRaiseC:#b91c1c;
--gcCall:rgba(22,163,74,.18);--gcCallC:#15803d;
--gcFold:#eaeaef;--gcFoldC:#a0a0b4;
--gcMixRC:linear-gradient(135deg,rgba(220,38,38,.2) 50%,rgba(22,163,74,.18) 50%);--gcMixRCC:#92400e;
--gcMixRF:linear-gradient(135deg,rgba(220,38,38,.15) 50%,#eaeaef 50%);--gcMixRFC:#b91c1c;
--gcMixCF:linear-gradient(135deg,rgba(22,163,74,.15) 50%,#eaeaef 50%);--gcMixCFC:#15803d;
}
[data-theme="dark"]{
--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22222e;
--surface:rgba(26,26,42,.85);--surfaceSolid:#1a1a2a;
--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
--text:#e8e8f0;--text2:#a0a0b8;--text3:#6a6a82;--text4:#44445a;
--red:#dc2626;--red2:#ef4444;--redBg:rgba(220,38,38,.12);
--green:#22c55e;--green2:#4ade80;--greenBg:rgba(34,197,94,.12);
--gold:#f59e0b;--goldBg:rgba(245,158,11,.12);
--blue:#3b82f6;--blueBg:rgba(59,130,246,.1);
--accent:#dc2626;--accentBg:rgba(220,38,38,.08);
--shadow:0 2px 16px rgba(0,0,0,.4);--shadow2:0 8px 32px rgba(0,0,0,.5);
--navBg:rgba(10,10,18,.95);
--gcRaise:rgba(220,38,38,.35);--gcRaiseC:#fca5a5;
--gcCall:rgba(34,197,94,.3);--gcCallC:#86efac;
--gcFold:var(--bg2);--gcFoldC:var(--text4);
--gcMixRC:linear-gradient(135deg,rgba(220,38,38,.35) 50%,rgba(34,197,94,.3) 50%);--gcMixRCC:#fde68a;
--gcMixRF:linear-gradient(135deg,rgba(220,38,38,.25) 50%,var(--bg2) 50%);--gcMixRFC:#fca5a5;
--gcMixCF:linear-gradient(135deg,rgba(34,197,94,.2) 50%,var(--bg2) 50%);--gcMixCFC:#86efac;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
.thbtn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:8px;transition:all .15s;}.thbtn:hover{background:var(--bg3);transform:scale(1.1);}

/* Nav */
.nav{background:var(--navBg,rgba(10,10,18,.95));backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:50;}
.nav-brand{display:flex;align-items:center;gap:10px;margin-right:32px;}
.nav-brand svg{width:22px;height:22px;}
.nav-brand span{font-weight:800;font-size:14px;letter-spacing:-.5px;color:#e8e8f0;}
.nav-tabs{display:flex;gap:2px;height:100%;align-items:end;}
.ntab{padding:10px 18px;font-size:12px;font-weight:600;color:#6a6a82;cursor:pointer;border:none;background:none;font-family:inherit;transition:all .15s;border-bottom:2px solid transparent;letter-spacing:.3px;text-transform:uppercase;}
.ntab:hover{color:#a0a0b8;}
.ntab.active{color:var(--red);border-bottom-color:var(--red);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.nav-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:#6a6a82;padding:4px 10px;border:1px solid rgba(255,255,255,.1);border-radius:6px;}

/* Main */
.main{max-width:1100px;margin:0 auto;padding:24px;}
.tc{display:none;animation:fu .25s ease;}.tc.active{display:block;}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Stats bar */
.stats{display:flex;gap:1px;background:var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px;}
.stat{flex:1;padding:16px 18px;background:var(--bg2);text-align:center;}
.stat:first-child{border-radius:12px 0 0 12px;}.stat:last-child{border-radius:0 12px 12px 0;}
.stat-v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;color:var(--text);}
.stat-v.red{color:var(--red);}.stat-v.green{color:var(--green);}.stat-v.gold{color:var(--gold);}
.stat-l{font-size:9px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:1px;font-weight:600;}

/* Cards */
.card{background:var(--surface);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;transition:border-color .15s;}
.card:hover{border-color:var(--border2);}
.card-h{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.card-title{font-size:15px;font-weight:700;letter-spacing:-.3px;}
.card-body{padding:20px;}

/* Range Grid */
.grid-wrap{display:flex;justify-content:center;margin:0 auto;}
.grid{display:grid;grid-template-columns:repeat(14,1fr);gap:1px;background:var(--bg);border-radius:8px;overflow:hidden;width:100%;max-width:680px;}
.gc{display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;height:38px;min-width:0;transition:all .12s;position:relative;user-select:none;}
.gc.hdr{background:var(--bg3);color:var(--text3);font-weight:700;font-size:9px;}
.gc.raise{background:var(--gcRaise);color:var(--gcRaiseC);}
.gc.call{background:var(--gcCall);color:var(--gcCallC);}
.gc.fold{background:var(--gcFold);color:var(--gcFoldC);}
.gc.mixed-rc{background:var(--gcMixRC);color:var(--gcMixRCC);}
.gc.mixed-rf{background:var(--gcMixRF);color:var(--gcMixRFC);}
.gc.mixed-cf{background:var(--gcMixCF);color:var(--gcMixCFC);}
.gc.pair{font-weight:800;}
.gc:hover{filter:brightness(1.3);z-index:1;transform:scale(1.05);}
.gc .pct{position:absolute;bottom:1px;right:2px;font-size:8px;opacity:.75;font-weight:600;}

/* Legend */
.legend{display:flex;gap:16px;justify-content:center;margin:12px 0;font-size:11px;color:var(--text3);}
.legend span{display:flex;align-items:center;gap:5px;}
.ldot{width:12px;height:12px;border-radius:3px;}
.ldot.r{background:rgba(220,38,38,.4);}.ldot.c{background:rgba(34,197,94,.35);}.ldot.f{background:var(--bg2);border:1px solid var(--border2);}.ldot.m{background:linear-gradient(135deg,rgba(220,38,38,.3) 50%,rgba(34,197,94,.25) 50%);}

/* Progress */
.prog{display:flex;gap:3px;align-items:center;}
.prog .dot{width:8px;height:8px;border-radius:50%;background:var(--bg4);transition:background .2s;}
.prog .dot.done{background:var(--red);}.prog .dot.gold{background:var(--gold);}
.prog-l{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--text3);margin-left:6px;}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;}
.badge.new{background:var(--blueBg);color:var(--blue);}.badge.learning{background:var(--redBg);color:var(--red2);}
.badge.mastered{background:var(--goldBg);color:var(--gold);}.badge.due{background:rgba(220,38,38,.2);color:var(--red2);}
.badge.noex{background:rgba(245,158,11,.15);color:var(--gold);}

/* Two column layout */
.al{display:flex;gap:20px;min-height:70vh;}
.al-l{width:320px;flex-shrink:0;overflow-y:auto;max-height:calc(100vh - 100px);position:sticky;top:76px;}
.al-l::-webkit-scrollbar{width:3px;}.al-l::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px;}
.al-r{flex:1;min-width:0;}
@media(max-width:900px){.al{flex-direction:column;}.al-l{width:100%;position:static;max-height:none;}}

/* List items */
.li{padding:12px 14px;border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer;transition:all .12s;background:var(--bg2);}
.li:hover{border-color:var(--border2);background:var(--bg3);}
.li.sel{border-color:var(--red);background:rgba(220,38,38,.06);box-shadow:0 0 0 1px rgba(220,38,38,.2);}
.li.mst{border-color:rgba(245,158,11,.3);}
.li-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.li-name{font-size:13px;font-weight:600;}.li-cat{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.li-bot{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.li-status{font-size:10px;color:var(--text4);font-family:'JetBrains Mono',monospace;}

/* Detail panel */
.dp{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.dp-name{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;}
.dp-cat{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:16px;}
.dp-section{margin-top:16px;}.dp-section-t{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}

/* Timeline */
.tl{display:flex;flex-direction:column;gap:0;}
.tl-i{display:flex;align-items:center;gap:10px;padding:5px 0;position:relative;}
.tl-i:not(:last-child)::after{content:'';position:absolute;left:8px;top:24px;bottom:-5px;width:1.5px;background:var(--border2);}
.tl-d{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;z-index:1;}
.tl-d.done{background:var(--red);color:white;}.tl-d.pend{background:var(--bg4);color:var(--text4);}
.tl-d.due{background:var(--red2);color:white;animation:pulse 2s infinite;}.tl-d.gld{background:var(--gold);color:white;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.tl-info{flex:1;font-size:11px;color:var(--text2);}.tl-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text4);}

/* Notes */
.notes{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.note-item{padding:6px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:start;}
.note-item:last-child{border:none;}
.note-date{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text4);min-width:36px;padding-top:2px;flex-shrink:0;}
.note-text{font-size:12px;color:var(--text2);line-height:1.5;flex:1;min-width:0;white-space:pre-wrap;word-break:break-word;}
.note-edit{width:100%;padding:4px 8px;border:1px solid var(--border2);border-radius:5px;font-family:'Inter',sans-serif;font-size:12px;background:var(--bg);color:var(--text);outline:none;resize:none;min-height:32px;display:none;line-height:1.5;}
.note-edit:focus{border-color:var(--red);}
.note-actions{display:flex;gap:4px;flex-shrink:0;margin-left:4px;align-items:start;}
.note-actions button{border:none;background:none;cursor:pointer;font-size:10px;padding:2px 5px;border-radius:4px;color:var(--text4);transition:all .12s;}
.note-actions button:hover{background:var(--bg3);color:var(--text);}
.note-actions button.del-note:hover{color:var(--red);background:var(--redBg);}
.note-input{width:100%;padding:10px 14px;border:1px solid var(--border2);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;background:var(--bg);color:var(--text);outline:none;resize:none;min-height:48px;transition:border-color .2s;}
.note-input:focus{border-color:var(--red);}

/* Buttons */
.btn{padding:9px 18px;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:6px;letter-spacing:.2px;}
.btn-p{background:var(--red);color:white;}.btn-p:hover{background:#b91c1c;}
.btn-s{background:transparent;color:var(--text2);border:1px solid var(--border2);}.btn-s:hover{background:var(--bg3);color:var(--text);}
.btn-g{background:var(--green);color:white;}.btn-g:hover{background:#16a34a;}
.btn-d{background:transparent;color:var(--text4);border:1px solid var(--border);}.btn-d:hover{background:var(--redBg);color:var(--red);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.actions{display:flex;gap:8px;margin-top:12px;align-items:center;}
.actions .note-hint{font-size:10px;color:var(--text4);flex:1;}

/* Empty */
.empty{text-align:center;padding:48px 24px;color:var(--text4);}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.4;}.empty-text{font-size:14px;font-weight:500;margin-bottom:16px;}

/* Today cards */
.today-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;}
.today-card.due-card{border-color:rgba(220,38,38,.2);}
.today-card.noex-card{border-color:rgba(245,158,11,.2);}
.tc-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.tc-name{font-size:16px;font-weight:700;letter-spacing:-.3px;}
.tc-body{padding:20px;}

/* Filter */
.fb{display:flex;gap:8px;margin-bottom:16px;align-items:center;}
.fb select{padding:6px 10px;border:1px solid var(--border2);border-radius:6px;font-family:'Inter',sans-serif;font-size:11px;background:var(--bg2);color:var(--text);outline:none;font-weight:500;}

/* Progress bar */
.pbar{width:100%;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin:8px 0;}
.pbar-f{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:2px;transition:width .5s;}

/* Confetti */
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden;}
.confetti-p{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall 1.2s ease-out forwards;}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1);}100%{opacity:0;transform:translateY(80vh) rotate(720deg) scale(0.3);}}

/* Card done slide-out */
@keyframes cardDone{0%{opacity:1;transform:translateX(0) scale(1);}60%{opacity:.6;transform:translateX(30px) scale(.97);}100%{opacity:0;transform:translateX(120px) scale(.9);height:0;padding:0;margin:0;border:0;overflow:hidden;}}
.today-card.card-done{animation:cardDone .6s ease-out forwards;pointer-events:none;}

/* All-done popup */
.cpop-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:10000;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s;}
.cpop{background:var(--surfaceSolid);border-radius:18px;padding:36px 40px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:360px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{0%{transform:scale(.7);opacity:0;}100%{transform:scale(1);opacity:1;}}
@keyframes fadeIn{0%{opacity:0;}100%{opacity:1;}}
.cpop-icon{font-size:48px;margin-bottom:12px;}
.cpop-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px;}
.cpop-sub{font-size:13px;color:var(--text3);margin-bottom:18px;}
.cpop .btn{min-width:120px;display:block;margin:0 auto;text-align:center;}

/* Completed today green cards */
.done-section-hdr{margin:24px 0 10px;font-size:13px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:6px;}
.today-card.done-card{opacity:.7;border-left:3px solid var(--green);}
.done-note-box{margin-top:6px;padding:8px 12px;background:var(--greenBg);border-radius:7px;font-size:13px;line-height:1.5;color:var(--text2);}

/* Stats tab */
.stat-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;}
.stat-box{background:var(--bg2);padding:18px 14px;text-align:center;transition:background .2s;}
.stat-box:first-child{border-radius:14px 0 0 14px;}.stat-box:last-child{border-radius:0 14px 14px 0;}
.sv{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:800;color:var(--text);line-height:1;}
.sv.red{color:var(--red);}.sv.green{color:var(--green);}.sv.gold{color:var(--gold);}
.sl{font-size:9px;color:var(--text3);margin-top:5px;text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px;}
@media(max-width:700px){.stats-row{grid-template-columns:1fr;}}
.flame-anim{animation:flameFlicker 1.5s ease-in-out infinite alternate;}
@keyframes flameFlicker{0%{transform:scale(1) translateY(0);filter:brightness(1);}50%{transform:scale(1.06) translateY(-2px);filter:brightness(1.15);}100%{transform:scale(.97) translateY(1px);filter:brightness(.95);}}
.stat-bar-anim{animation:barGrow .8s cubic-bezier(.23,1,.32,1) both;}
@keyframes barGrow{from{transform:scaleY(0);}to{transform:scaleY(1);}}
</style>
</head>
<body>
<nav class="nav">
<div class="nav-brand">
<svg viewBox="0 0 22 22"><polygon points="11,1 21,11 11,21 1,11" fill="#dc2626"/><polygon points="11,5 17,11 11,17 5,11" fill="white" opacity=".2"/></svg>
<span>Range Master</span>
</div>
<div class="nav-tabs" id="nv"></div>
<div class="nav-right"><span class="nav-count" id="navCount"></span><button class="thbtn" id="thBtn" onclick="tTh()">☀️</button></div>
</nav>
<div class="main">
<div class="tc" id="tTasks"></div>
<div class="tc" id="tAll"></div>
<div class="tc" id="tStats"></div>
<div class="tc" id="tPosition"></div>
</div>

const td=()=>new Date().toISOString().split('T')[0];
const fmt=d=>d?((p=d.split('-'))&&`${+p[1]}/${+p[2]}`):'—';
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function cNext(fromDate,rc){if(rc>=5)return null;const d=new Date(fromDate);d.setDate(d.getDate()+INTV[rc]);return d.toISOString().split('T')[0];}
function daysLeft(r){if(!r.nextReviewDate||r.mastered)return null;return Math.round((new Date(r.nextReviewDate)-new Date(td()))/864e5);}
function isDue(r){return!r.mastered&&r.activated&&r.nextReviewDate&&r.nextReviewDate<=td();}
function isNoNote(r){return r.activated&&r.reviewCount===0&&r.notes.length===0;}

// === skillme integration ===
function notifyParent(type,payload){
  if(window.parent===window)return;
  window.parent.postMessage({source:'range-master',type,payload},'*');
}
function buildSnapshot(){
  const total=RANGE_META.length;
  const mastered=D.ranges.filter(r=>r.mastered).length;
  const noNote=D.ranges.filter(r=>isNoNote(r)).length;
  const active=D.ranges.filter(r=>r.activated&&!r.mastered).length-noNote;
  const due=D.ranges.filter(isDue).length;
  let streak=0;const d=new Date();
  const revDates=new Set();D.ranges.forEach(r=>(r.notes||[]).forEach(n=>{if(n.date)revDates.add(n.date);}));
  for(let i=0;i<365;i++){const ds=new Date(d);ds.setDate(ds.getDate()-i);const dk=ds.getFullYear()+'-'+String(ds.getMonth()+1).padStart(2,'0')+'-'+String(ds.getDate()).padStart(2,'0');if(revDates.has(dk))streak++;else if(i>0)break;}
  return{total,active,due,mastered,streak};
}
function buildTasks(){
  const today=td();const tasks=[];
  D.ranges.forEach(function(r){
    const meta=getMeta(r.id);if(!meta)return;
    if(isDue(r)){
      tasks.push({id:r.id,title:meta.label||r.id,subtitle:meta.cat||'',taskType:'review',reviewStage:r.reviewCount,isOverdue:r.nextReviewDate<today,dueDate:r.nextReviewDate||null});
    }else if(isNoNote(r)){
      tasks.push({id:r.id,title:meta.label||r.id,subtitle:meta.cat||'',taskType:'activation',reviewStage:null,isOverdue:false,dueDate:null});
    }
  });
  return tasks;
}
window.addEventListener('message',function(ev){
  if(ev.data&&ev.data.type==='request:snapshot'){notifyParent('snapshot',buildSnapshot());}
  if(ev.data&&ev.data.type==='request:tasks'){notifyParent('tasks',{tasks:buildTasks()});}
});

function getAction(grid,hand){const v=grid[hand];if(!v)return[100,0,0];return v;}
function actionClass(f,c,r){
  if(r>=c&&r>=f&&r>0)return'raise';if(c>=f&&c>0)return'call';return'fold';
}
function cellGrad(f,c,r){
  if(r>=100)return'var(--gcRaise)';if(c>=100)return'var(--gcCall)';if(f>=100)return'var(--gcFold)';
  const parts=[];let pos=0;
  if(r>0){parts.push(`var(--gcRaise) ${pos}% ${pos+r}%`);pos+=r;}
  if(c>0){parts.push(`var(--gcCall) ${pos}% ${pos+c}%`);pos+=c;}
  if(f>0){parts.push(`var(--gcFold) ${pos}% ${pos+f}%`);pos+=f;}
  return`linear-gradient(135deg,${parts.join(',')})`;
}

function rGrid(rangeId){
  const grid=getGrid(rangeId);
  let h='<div class="grid-wrap"><div class="grid">';
  h+='<div class="gc hdr"></div>';
  RANKS.forEach(r=>{h+=`<div class="gc hdr">${r}</div>`;});
  for(let row=0;row<13;row++){
    h+=`<div class="gc hdr">${RANKS[row]}</div>`;
    for(let col=0;col<13;col++){
      const hand=getHand(row,col);
      const[f,c,r]=getAction(grid,hand);
      const cls=actionClass(f,c,r);
      const isPair=row===col;
      const dominant=r>=c&&r>=f?r:(c>=f?c:f);
      h+=`<div class="gc ${cls}${isPair?' pair':''}" style="background:${cellGrad(f,c,r)}" title="${hand}: R${r}% C${c}% F${f}%">${hand}${dominant<100&&dominant>0?`<span class="pct">${dominant}</span>`:''}</div>`;
    }
  }
  h+='</div></div>';
  h+='<div class="legend"><span><div class="ldot r"></div>Raise</span><span><div class="ldot c"></div>Call</span><span><div class="ldot f"></div>Fold</span><span><div class="ldot m"></div>Mixed</span></div>';
  return h;
}

function rProg(r){
  let h='<div class="prog">';
  for(let i=0;i<5;i++){const c=i<r.reviewCount?(r.mastered?'dot gold':'dot done'):'dot';h+=`<div class="${c}"></div>`;}
  h+=`<span class="prog-l">${r.reviewCount}/5</span></div>`;return h;
}

function rTips(id){
  const tips=RANGE_TIPS[id];if(!tips||!tips.length)return'';
  let h='<div style="margin-top:12px;display:flex;flex-direction:column;gap:4px">';
  tips.forEach(t=>{h+=`<div style="display:flex;gap:6px;align-items:start;padding:6px 10px;background:var(--bg2);border-radius:6px;border:1px solid var(--border);font-size:11px;color:var(--text2);line-height:1.4"><span style="color:var(--gold);flex-shrink:0">▸</span><span>${esc(t)}</span></div>`;});
  return h+'</div>';
}

  h+=`</div></div>`;

  h+=`<div style="min-width:100px;background:var(--surface);border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow);padding:16px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center">`;

  if(dues.length){
    h+=`<div class="dp-section-t" style="margin-bottom:10px;color:var(--red2)">Due for Review</div>`;
    dues.forEach(r=>{
      const m=getMeta(r.id);if(!m)return;

      if(r.notes.length){h+=`<div class="dp-section" style="margin-top:16px"><div class="dp-section-t">Previous Notes</div><div class="notes">`;r.notes.forEach((n,ni)=>{h+=`<div class="note-item"><span class="note-date">${fmt(n.date)}</span><span class="note-text" id="nt_${r.id}_${ni}" ondblclick="editNote('${r.id}',${ni},this)">${esc(n.text)}</span><textarea class="note-edit" id="ne_${r.id}_${ni}" onblur="saveEditNote('${r.id}',${ni})" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();saveEditNote('${r.id}',${ni})}">${esc(n.text)}</textarea><div class="note-actions"><button onclick="editNote('${r.id}',${ni},document.getElementById('nt_${r.id}_${ni}'))" title="Edit">✎</button><button class="del-note" onclick="delNote('${r.id}',${ni})" title="Delete">✕</button></div></div>`;});h+=`</div></div>`;}
      h+=`<div style="margin-top:12px"><textarea class="note-input" id="tn_${r.id}" placeholder="Write review notes..."></textarea><div class="actions"><span class="note-hint">Review #${r.reviewCount+1} of 5</span><button class="btn btn-p" onclick="saveNote('${r.id}','tn_${r.id}',false)">Save & Complete Review</button></div></div></div></div>`;
    });
  }

  if(!dues.length&&!noNotes.length&&D.ranges.length){
    h+=`<div class="empty"><div class="empty-icon">◆</div><div class="empty-text">All clear for today</div>${notStarted>0?'<button class="btn btn-p" onclick="learnNew()">Learn New Range</button>':''}</div>`;

  if(!D.ranges.length){

  }

  // === Completed Today section ===
  const doneToday=D.ranges.filter(r=>{
    const lastNote=r.notes.length?r.notes[r.notes.length-1]:null;
    return lastNote&&lastNote.date===td()&&!isDue(r)&&!isNoNote(r);
  });
  if(doneToday.length){
    h+=`<div class="done-section-hdr"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> Completed Today (${doneToday.length})</div>`;
    doneToday.forEach(r=>{
      const m=getMeta(r.id);if(!m)return;
      const lastNote=r.notes[r.notes.length-1];
      h+=`<div class="today-card done-card"><div class="tc-header"><div style="display:flex;align-items:center;gap:8px"><div class="tc-name">${esc(m.label)}</div>${r.mastered?'<span class="badge mastered" style="font-size:9px">Mastered!</span>':''}</div>${rProg(r)}</div>`;
      if(lastNote) h+=`<div class="tc-body"><div class="done-note-box">${esc(lastNote.text)}</div></div>`;
      h+=`</div>`;
    });
  }

  el.innerHTML=h;
}

// Sound effects
function playRevSound(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();const g=ac.createGain();g.connect(ac.destination);g.gain.setValueAtTime(0.3,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.4);const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(523,ac.currentTime);o.frequency.setValueAtTime(659,ac.currentTime+0.1);o.frequency.setValueAtTime(784,ac.currentTime+0.2);o.connect(g);o.start(ac.currentTime);o.stop(ac.currentTime+0.4);}catch(e){}}
function playMasterSound(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();const g=ac.createGain();g.connect(ac.destination);g.gain.setValueAtTime(0.3,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.8);const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(523,ac.currentTime);o.frequency.setValueAtTime(659,ac.currentTime+0.15);o.frequency.setValueAtTime(784,ac.currentTime+0.3);o.frequency.setValueAtTime(1047,ac.currentTime+0.45);o.connect(g);o.start(ac.currentTime);o.stop(ac.currentTime+0.8);}catch(e){}}
function playAllDoneSound(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();const g=ac.createGain();g.connect(ac.destination);g.gain.setValueAtTime(0.25,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+1.2);[523,659,784,1047,784,1047].forEach((f,i)=>{const o=ac.createOscillator();o.type='sine';o.frequency.value=f;const og=ac.createGain();og.connect(g);og.gain.setValueAtTime(0.25,ac.currentTime+i*0.15);og.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+i*0.15+0.3);o.connect(og);o.start(ac.currentTime+i*0.15);o.stop(ac.currentTime+i*0.15+0.3);});}catch(e){}}

// Confetti
function fireConfetti(el){const wrap=document.createElement('div');wrap.className='confetti-wrap';document.body.appendChild(wrap);const colors=['#dc2626','#22c55e','#facc15','#3b82f6','#a78bfa','#f43f5e'];const rect=el?el.getBoundingClientRect():null;const cx=rect?rect.left+rect.width/2:window.innerWidth/2;const cy=rect?rect.top:window.innerHeight/2;for(let i=0;i<40;i++){const p=document.createElement('div');p.className='confetti-p';p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.left=(cx+Math.random()*200-100)+'px';p.style.top=(cy+Math.random()*40-20)+'px';p.style.animationDuration=(0.8+Math.random()*0.8)+'s';p.style.animationDelay=(Math.random()*0.2)+'s';p.style.width=(5+Math.random()*6)+'px';p.style.height=(5+Math.random()*6)+'px';wrap.appendChild(p);}setTimeout(()=>wrap.remove(),2000);}

// All-done popup
function showAllDonePopup(){const ov=document.createElement('div');ov.className='cpop-overlay';ov.onclick=e=>{if(e.target===ov)ov.remove();};ov.innerHTML=`<div class="cpop"><div class="cpop-icon">&#10024;</div><div class="cpop-title">All Reviews Complete!</div><div class="cpop-sub">You've finished all of today's review tasks. Great work!</div><button class="btn btn-p" onclick="this.closest('.cpop-overlay').remove()">Done</button></div>`;document.body.appendChild(ov);playAllDoneSound();fireConfetti();}

function learnNew(){
  const notStarted=RANGE_META.filter(m=>!D.ranges.find(r=>r.id===m.id));
  if(!notStarted.length)return;
  const pick=notStarted[Math.floor(Math.random()*notStarted.length)];
  D.ranges.push({id:pick.id,activated:true,learnedDate:td(),reviewCount:0,nextReviewDate:null,mastered:false,notes:[]});
  save();rNav();rT();
}

function saveNote(id,inputId,isActivation){
  const r=D.ranges.find(x=>x.id===id);if(!r)return;
  const inp=document.getElementById(inputId);
  if(!inp||!inp.value.trim()){alert('Please write a note.');return;}
  r.notes.push({date:td(),text:inp.value.trim()});
  let justMastered=false;
  if(isActivation){
    r.nextReviewDate=cNext(td(),0);
    notifyParent('task:activation',{rangeId:id,date:td()});
  } else if(isDue(r)){
    r.reviewCount++;
    if(r.reviewCount>=5){r.mastered=true;r.nextReviewDate=null;justMastered=true;notifyParent('task:mastery',{rangeId:id,date:td(),reviewCount:r.reviewCount});}
    else{r.nextReviewDate=cNext(td(),r.reviewCount);notifyParent('task:review',{rangeId:id,date:td(),reviewCount:r.reviewCount});}
  }
  save();

  // Effects
  const card=inp?inp.closest('.today-card'):null;
  const btn=inp?inp.parentElement.querySelector('.btn'):null;
  if(justMastered){playMasterSound();fireConfetti(btn);}
  else{playRevSound();fireConfetti(btn);}

  // Slide-out animation on Today tab
  if(ct==='tasks'&&card){card.classList.add('card-done');setTimeout(()=>{rTasks();rNav();},650);}
  else{if(ct==='tasks')rTasks();rNav();}
  if(ct==='all'){rAllList();rAllDet();rNav();}

  // Check if all today's tasks are done
  setTimeout(()=>{
    const duesLeft=D.ranges.filter(isDue).length;
    const noNotesLeft=D.ranges.filter(r=>r.activated&&!r.mastered&&r.notes.length===0&&r.reviewCount===0).length;
    if(duesLeft===0&&noNotesLeft===0&&ct==='tasks'&&D.ranges.length){showAllDonePopup();}
  },700);
}

// ALL
function rAll(){
  const el=document.getElementById('tAll');
  let h=`<div class="fb"><select id="ff" onchange="rAllList()"><option value="all">All</option><option value="rfi">RFI Only</option><option value="vs">vs RFI Only</option><option value="learning">Learning</option><option value="due">Due</option><option value="mastered">Mastered</option><option value="not_started">Not Started</option></select></div>`;
  h+=`<div class="al"><div class="al-l" id="aL"></div><div class="al-r" id="aR"></div></div>`;
  el.innerHTML=h;rAllList();rAllDet();
}

function rAllList(){
  const el=document.getElementById('aL');if(!el)return;
  const f=document.getElementById('ff')?.value||'all';
  let items=RANGE_META.map(m=>{
    const r=D.ranges.find(x=>x.id===m.id);
    return{meta:m,data:r};
  }).filter(({meta:m,data:r})=>{
    if(f==='rfi')return m.cat==='RFI';
    if(f==='vs')return m.cat==='VS_RFI';
    if(f==='learning')return r&&r.activated&&!r.mastered;
    if(f==='due')return r&&isDue(r);
    if(f==='mastered')return r&&r.mastered;
    if(f==='not_started')return!r;
    return true;
  }).sort((a,b)=>{
    if(!a.data&&b.data)return 1;if(a.data&&!b.data)return-1;
    if(a.data&&b.data){
      if(a.data.mastered!==b.data.mastered)return a.data.mastered?1:-1;
      const ad=isDue(a.data),bd=isDue(b.data);if(ad!==bd)return ad?-1:1;
    }
    return 0;
  });

  let h='';
  let lastCat='';
  items.forEach(({meta:m,data:r})=>{
    if(f==='all'&&m.cat!==lastCat){
      lastCat=m.cat;
      h+=`<div style="font-size:9px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:1px;padding:8px 4px 4px;margin-top:${lastCat?'12px':'0'}">${m.cat==='RFI'?'Raise First In':'vs RFI (3bet / Call / Fold)'}</div>`;
    }
    const started=!!r;const due=r&&isDue(r);const dl=r?daysLeft(r):null;
    let status='';
    if(!started)status='Not started';
    else if(r.mastered)status='Mastered';
    else if(due)status='Due today';
    else if(dl!==null&&dl>0)status=`${dl}d`;
    else if(r.notes.length===0)status='Needs note';
    else status=fmt(r.nextReviewDate);

    h+=`<div class="li${selId===m.id?' sel':''}${r&&r.mastered?' mst':''}" onclick="selId='${m.id}';rAllList();rAllDet();">`;
    h+=`<div class="li-top"><span class="li-name">${esc(m.label)}</span>${r?rProg(r):'<span class="badge new">—</span>'}</div>`;
    h+=`<div class="li-bot"><span class="li-cat">${esc(m.cat)}</span><span class="li-status">${status}</span></div></div>`;
  });
  if(!items.length)h=`<div class="empty" style="padding:20px"><div class="empty-text" style="font-size:12px">No ranges match filter</div></div>`;
  el.innerHTML=h;
}

function rAllDet(){
  const el=document.getElementById('aR');if(!el)return;
  const m=RANGE_META.find(x=>x.id===selId);
  if(!m){el.innerHTML=`<div class="dp"><div class="empty" style="padding:24px"><div class="empty-icon">◆</div><div class="empty-text">Select a range</div></div></div>`;return;}
  const r=D.ranges.find(x=>x.id===m.id);
  const due=r&&isDue(r);const noNote=r&&r.notes.length===0&&r.reviewCount===0;

  let h=`<div class="dp"><div class="dp-name">${esc(m.label)}</div><div class="dp-cat">${esc(m.desc)}</div>`;
  if(r)h+=rProg(r);
  h+=`<div style="margin-top:16px">${rGrid(m.id)}</div>`;

  // Tips
  const tips=RANGE_TIPS[m.id];
  if(tips&&tips.length){
    h+=`<div class="dp-section"><div class="dp-section-t">Tips & Strategy</div><div style="display:flex;flex-direction:column;gap:6px">`;
    tips.forEach(t=>{h+=`<div style="display:flex;gap:8px;align-items:start;padding:8px 12px;background:var(--bg2);border-radius:8px;border:1px solid var(--border);font-size:12px;color:var(--text2);line-height:1.5"><span style="color:var(--gold);font-size:14px;flex-shrink:0;margin-top:1px">▸</span><span>${esc(t)}</span></div>`;});
    h+=`</div></div>`;
  }

  // Timeline
  if(r){
    h+=`<div class="dp-section"><div class="dp-section-t">Timeline</div><div class="tl">`;
    h+=`<div class="tl-i"><div class="tl-d done">+</div><div class="tl-info">Started</div><div class="tl-date">${fmt(r.learnedDate)}</div></div>`;
    for(let i=0;i<5;i++){
      const done=i<r.reviewCount;const isCur=!done&&r.reviewCount===i&&r.nextReviewDate===td();
      const dc=done?(i===4?'tl-d gld':'tl-d done'):isCur?'tl-d due':'tl-d pend';
      const rv=r.notes[i+1];
      h+=`<div class="tl-i"><div class="${dc}">${done?'✓':(i+1)}</div><div class="tl-info">Review ${i+1} · +${INTV[i]}d</div><div class="tl-date">${done&&r.notes[i]?fmt(r.notes[i].date):(r.reviewCount===i&&r.nextReviewDate?fmt(r.nextReviewDate):'—')}</div></div>`;
    }
    h+=`</div></div>`;

    // Notes
    if(r.notes.length){
      h+=`<div class="dp-section"><div class="dp-section-t">Notes</div><div class="notes">`;
      r.notes.forEach((n,ni)=>{h+=`<div class="note-item"><span class="note-date">${fmt(n.date)}</span><span class="note-text" id="ant_${r.id}_${ni}" ondblclick="editNote('${r.id}',${ni},this,'a')">${esc(n.text)}</span><textarea class="note-edit" id="ane_${r.id}_${ni}" onblur="saveEditNote('${r.id}',${ni},'a')" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();saveEditNote('${r.id}',${ni},'a')}">${esc(n.text)}</textarea><div class="note-actions"><button onclick="editNote('${r.id}',${ni},document.getElementById('ant_${r.id}_${ni}'),'a')" title="Edit">✎</button><button class="del-note" onclick="delNote('${r.id}',${ni},'a')" title="Delete">✕</button></div></div>`;});
      h+=`</div></div>`;
    }

    // Note input
    if(!r.mastered){
      const label=noNote?'Save & Activate':due?'Save & Complete Review':'Save Note';
      h+=`<div style="margin-top:14px"><textarea class="note-input" id="aIn_${r.id}" placeholder="Write notes..."></textarea><div class="actions"><span class="note-hint">${noNote?'First note activates review cycle':due?'Review #'+(r.reviewCount+1)+' of 5':'Add note'}</span><button class="btn btn-p" onclick="saveNoteAll('${r.id}')"> ${label}</button></div></div>`;
    }

    h+=`<div style="margin-top:16px;display:flex;justify-content:space-between"><span class="badge ${r.mastered?'mastered':'learning'}">${r.mastered?'Mastered':'Learning'}</span><button class="btn btn-d" onclick="resetR('${r.id}')" style="font-size:10px">Reset</button></div>`;
  } else {
    h+=`<div style="margin-top:16px"><button class="btn btn-p" onclick="startR('${m.id}')">Start Learning</button></div>`;
  }
  h+=`</div>`;
  el.innerHTML=h;
}

function saveNoteAll(id){
  const r=D.ranges.find(x=>x.id===id);if(!r)return;
  const noNote=r.notes.length===0&&r.reviewCount===0;
  const due=isDue(r);
  saveNote(id,'aIn_'+id,noNote);
  rAllList();rAllDet();
}

function startR(id){
  if(D.ranges.find(r=>r.id===id))return;
  D.ranges.push({id,activated:true,learnedDate:td(),reviewCount:0,nextReviewDate:null,mastered:false,notes:[]});
  selId=id;save();rAllList();rAllDet();
}

function resetR(id){
  if(!confirm('Reset this range? All progress will be lost.'))return;
  D.ranges=D.ranges.filter(r=>r.id!==id);
  save();rNav();rAllList();rAllDet();
}

// PROGRESS
function animateNum(el,target,duration=600){
  const start=performance.now();
  const from=0;
  function tick(now){
    const t=Math.min((now-start)/duration,1);
    const ease=1-Math.pow(1-t,3);
    el.textContent=Math.round(from+(target-from)*ease);
    if(t<1)requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

  h+=`<span style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;color:var(--gold)" data-anim="${pct}" data-delay="300" data-suffix="%">0</span>`;
  h+=`</div></div>`;
  h+=`<div style="font-size:12px;color:var(--text3)">${mastered} of ${total} mastered</div>`;
  h+=`</div></div>`;

  // --- C. Day Streak ---
  const allDates=new Set();

  let streak=0;
  const today=new Date(td());
  for(let i=0;i<365;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const ds=d.toISOString().split('T')[0];
    if(allDates.has(ds))streak++;else break;
  }
  let flameSize=44,flameColor='var(--text4)',flameGlow='',flameMsg='Start your streak!';
  if(streak>=1&&streak<=3){flameSize=52;flameColor='var(--gold)';flameMsg='Keep it up!';}
  if(streak>=4&&streak<=7){flameSize=64;flameColor='#f97316';flameMsg='On a roll!';}
  if(streak>=8){flameSize=80;flameColor='var(--red)';flameGlow=`filter:drop-shadow(0 0 12px var(--red));`;flameMsg="You're on fire!";}

  h+=`<div class="card"><div class="card-h"><span class="card-title">Day Streak</span></div><div class="card-body" style="display:flex;flex-direction:column;align-items:center;gap:8px">`;
  h+=`<div class="flame-anim" style="width:${flameSize}px;height:${flameSize}px;${flameGlow}">`;
  h+=`<svg viewBox="0 0 24 24" width="${flameSize}" height="${flameSize}" fill="${flameColor}"><path d="M12 23c-4.97 0-8-3.03-8-7 0-2.14.86-3.88 2-5.28.7-.87 1.46-1.6 2-2.72 0 0 .64 2.27 2.27 3.49C10.84 7.02 12 2 12 2s1 3 2.5 5.5c.6 1 1.3 1.8 1.5 3-.5-1-1.5-2-1.5-2s.5 2 .5 3.5c0 1.5-.5 3-2 4-1 .67-2.5 1-3.5 1h.5c3 0 5.5-2 6-4.5.33-1.67 0-3-.5-4.5-.67 2-1.5 2.5-1.5 2.5s.33-2.5-.5-4.5C12.73 4 11.5 2.5 12 2c-2 3-5.5 5-6.5 9-.5 2 0 4 .5 5.5C7 18.5 9 20 12 20c2.5 0 4.5-1.5 5-3.5.5-2-.5-4-2-5 .5 1.5 0 3-1 4-.5.5-1.5 1-2 1z"/></svg>`;
  h+=`</div>`;
  h+=`<div style="font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:800;color:${streak>0?flameColor:'var(--text4)'}" data-anim="${streak}" data-delay="200">0</div>`;
  h+=`<div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600">Day${streak!==1?'s':''} Streak</div>`;
  h+=`<div style="font-size:12px;color:var(--text2);font-weight:500;margin-top:2px">${flameMsg}</div>`;
  h+=`</div></div>`;

  // --- D. Daily Activity (14 days) ---
  const days14=[];
  for(let i=13;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const ds=d.toISOString().split('T')[0];
    const newCount=D.ranges.filter(r=>r.learnedDate===ds).length;
    const revCount=D.ranges.reduce((s,r)=>s+r.notes.filter(n=>n.date===ds).length,0);
    days14.push({date:ds,day:d.getDate(),newC:newCount,revC:revCount,isToday:i===0});
  }
  const maxAct=Math.max(1,...days14.map(d=>d.newC+d.revC));

  h+=`<div class="card"><div class="card-h"><span class="card-title">Daily Activity</span><span style="font-size:10px;color:var(--text3)">14 days</span></div><div class="card-body">`;
  h+=`<div style="display:flex;align-items:end;gap:4px;height:100px;padding-bottom:20px;position:relative">`;
  days14.forEach((d,i)=>{
    const totalH=d.newC+d.revC;
    const hPct=maxAct>0?(totalH/maxAct*100):0;
    const revPct=maxAct>0?(d.revC/maxAct*100):0;
    const newPct=maxAct>0?(d.newC/maxAct*100):0;
    const borderR=d.isToday?'border:1px solid var(--gold);':'';
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:0;position:relative">`;
    h+=`<div style="width:100%;display:flex;flex-direction:column;justify-content:end;height:80px">`;

    if(revPct>0)h+=`<div class="stat-bar-anim" style="width:100%;height:${revPct}%;background:var(--red);border-radius:${d.newC>0?'0':'3px 3px'} 0 0;min-height:${d.revC>0?'3px':'0'};${borderR}transform-origin:bottom;animation-delay:${i*40+20}ms"></div>`;
    if(totalH===0)h+=`<div style="width:100%;height:3px;background:var(--bg4);border-radius:3px"></div>`;
    h+=`</div>`;
    h+=`<div style="font-size:8px;color:${d.isToday?'var(--gold)':'var(--text4)'};margin-top:4px;font-weight:${d.isToday?'700':'400'}">${d.day}</div>`;
    h+=`</div>`;
  });
  h+=`</div>`;
  h+=`<div style="display:flex;gap:14px;justify-content:center;margin-top:4px">`;
  h+=`<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)"><span style="width:8px;height:8px;border-radius:2px;background:var(--green);display:inline-block"></span>New</div>`;
  h+=`<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)"><span style="width:8px;height:8px;border-radius:2px;background:var(--red);display:inline-block"></span>Review</div>`;
  h+=`</div></div></div>`;

  h+=`</div>`; // close stats-row

  // --- E. Review Stage Distribution ---
  const stages=['New','R1','R2','R3','R4','Mastered'];
  const stageCounts=[0,0,0,0,0,0];
  RANGE_META.forEach(m=>{
    const r=D.ranges.find(x=>x.id===m.id);
    if(!r){stageCounts[0]++;}
    else if(r.mastered){stageCounts[5]++;}
    else{const rc=Math.min(r.reviewCount,4);stageCounts[rc]++;}
  });
  const maxStage=Math.max(1,...stageCounts);

  h+=`<div class="card"><div class="card-h"><span class="card-title">Review Stage Distribution</span></div><div class="card-body">`;
  h+=`<div style="display:flex;align-items:end;gap:12px;height:140px;padding-bottom:28px">`;
  stages.forEach((s,i)=>{
    const hPct=maxStage>0?(stageCounts[i]/maxStage*100):0;
    const color=i===5?'var(--gold)':'var(--red)';
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;position:relative">`;
    h+=`<div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:${color};margin-bottom:4px" data-anim="${stageCounts[i]}" data-delay="${i*80}">0</div>`;
    h+=`<div style="width:100%;height:100px;display:flex;flex-direction:column;justify-content:end">`;
    h+=`<div class="stat-bar-anim" style="width:100%;height:${hPct}%;background:${color};border-radius:4px 4px 0 0;min-height:3px;transform-origin:bottom;animation-delay:${i*80}ms;opacity:.85"></div>`;
    h+=`</div>`;
    h+=`<div style="font-size:9px;color:var(--text3);margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">${s}</div>`;
    h+=`</div>`;
  });
  h+=`</div></div></div>`;

  el.innerHTML=h;

  // Fire animations after render
  requestAnimationFrame(()=>{
    // Count-up animations
    el.querySelectorAll('[data-anim]').forEach(e=>{
      const target=parseInt(e.dataset.anim)||0;
      const delay=parseInt(e.dataset.delay)||0;
      const suffix=e.dataset.suffix||'';
      setTimeout(()=>{
        const start=performance.now();
        function tick(now){
          const t=Math.min((now-start)/600,1);
          const ease=1-Math.pow(1-t,3);
          e.textContent=Math.round(target*ease)+(t>=1?suffix:'');

        requestAnimationFrame(tick);
      },delay);
    });

    // Mastery ring animation
    const ring=el.querySelector('.mastery-ring');
    if(ring){
      const target=parseFloat(ring.dataset.target);
      const total=parseFloat(ring.getAttribute('stroke-dasharray'));
      ring.style.transition='stroke-dashoffset 1s cubic-bezier(.23,1,.32,1)';
      setTimeout(()=>{ring.style.strokeDashoffset=target;},100);
    }
  });
}

function tTh(){
  const h=document.documentElement;
  const cur=h.getAttribute('data-theme');
  const n=cur==='dark'?'light':'dark';
  h.setAttribute('data-theme',n);
  document.getElementById('thBtn').textContent=n==='dark'?'☀️':'🌙';
  try{localStorage.setItem('prm_theme',n);}catch(e){}
}
function lTh(){
  try{
    const t=localStorage.getItem('prm_theme');
    if(t){document.documentElement.setAttribute('data-theme',t);document.getElementById('thBtn').textContent=t==='dark'?'☀️':'🌙';}
    else{document.documentElement.setAttribute('data-theme','dark');document.getElementById('thBtn').textContent='☀️';}
  }catch(e){document.documentElement.setAttribute('data-theme','dark');}
}

function editNote(id,ni,textEl,prefix){
  const p=prefix||'';
  const span=document.getElementById(p+'nt_'+id+'_'+ni);
  const ta=document.getElementById(p+'ne_'+id+'_'+ni);
  if(!span||!ta)return;
  span.style.display='none';
  ta.style.display='block';
  ta.focus();
  ta.selectionStart=ta.value.length;
}
function saveEditNote(id,ni,prefix){
  const p=prefix||'';
  const ta=document.getElementById(p+'ne_'+id+'_'+ni);
  if(!ta)return;
  const r=D.ranges.find(x=>x.id===id);
  if(!r||!r.notes[ni])return;
  const v=ta.value.trim();
  if(!v){return;}
  r.notes[ni].text=v;
  save();
  const span=document.getElementById(p+'nt_'+id+'_'+ni);
  if(span){span.textContent=v;span.style.display='';}
  ta.style.display='none';
}
function delNote(id,ni,prefix){
  if(!confirm('Delete this note?'))return;
  const r=D.ranges.find(x=>x.id===id);
  if(!r||!r.notes[ni])return;
  r.notes.splice(ni,1);
  save();rNav();rT();
  if(ct==='all'){rAllList();rAllDet();}
}
